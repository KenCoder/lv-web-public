name: Pages Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.gate.outputs.can_deploy }}
    steps:
      - name: Detect fork pull request
        id: gate
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.can_deploy == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Configure Pages
        if: steps.gate.outputs.can_deploy == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.gate.outputs.can_deploy == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-preview:
    if: needs.build.outputs.can_deploy == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy preview to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          preview: true

  comment-preview:
    if: needs.build.outputs.can_deploy == 'true'
    runs-on: ubuntu-latest
    needs: [build, deploy-preview]
    steps:
      - name: Comment preview URL on pull request
        uses: actions/github-script@v7
        with:
          script: |
            const body = `🔍 GitHub Pages preview is ready: ${process.env.PAGE_URL}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
        env:
          PAGE_URL: ${{ needs.deploy-preview.outputs.page_url }}

  comment-fork:
    if: needs.build.outputs.can_deploy != 'true'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Explain why preview was skipped
        uses: actions/github-script@v7
        with:
          script: |
            const body = "ℹ️ GitHub Pages preview was skipped because this PR comes from a fork. The default `GITHUB_TOKEN` on forked PRs does not have permission to deploy Pages.";
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
